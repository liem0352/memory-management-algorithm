<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="140" viewBox="0 0 1200 140" role="img" aria-labelledby="secTitle secDesc">
  <title id="secTitle">三种分配算法章节头</title>
  <desc id="secDesc">首次适应、最佳适应、最坏适应三种内存分配算法的选块策略对比,每张迷你内存条带高亮该算法会选中的空闲块位置。</desc>

  <!-- Background -->
  <rect width="1200" height="140" rx="20" fill="#0E1116"/>

  <!-- ============================================================= -->
  <!-- LEFT: Section label                                            -->
  <!-- ============================================================= -->
  <g id="section-label" transform="translate(64 36)" font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif'>
    <text x="0" y="0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" letter-spacing="3" fill="#6B7280">ALGORITHMS</text>
    <text x="0" y="46" font-size="36" font-weight="700" fill="#E8E4D9" letter-spacing="-0.5">三种分配算法</text>
    <rect x="0" y="60" width="32" height="2" fill="#C9A961"/>
    <text x="0" y="86" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#6B7280">First Fit · Best Fit · Worst Fit</text>
  </g>

  <!-- ============================================================= -->
  <!-- RIGHT: Three algorithm cards, each with a mini memory strip   -->
  <!-- showing which free block that algorithm would select.         -->
  <!-- ============================================================= -->
  <g id="algorithm-cards" transform="translate(560 38)" font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif'>

    <!-- ===== Card 1: FIRST FIT (picks first sufficient free block) ===== -->
    <g transform="translate(0 0)">
      <!-- mini strip 40 wide x 60 tall: 4 blocks, top one selected -->
      <rect x="0" y="0"  width="40" height="15" rx="2" fill="#C9A961" fill-opacity="0.85" stroke="#C9A961" stroke-width="1"/>
      <rect x="0" y="16" width="40" height="14" rx="2" fill="none" stroke="#4A9EFF" stroke-width="1" stroke-dasharray="2 2"/>
      <rect x="0" y="31" width="40" height="14" rx="2" fill="none" stroke="#4A9EFF" stroke-width="1" stroke-dasharray="2 2" stroke-opacity="0.4"/>
      <rect x="0" y="46" width="40" height="14" rx="2" fill="none" stroke="#4A9EFF" stroke-width="1" stroke-dasharray="2 2" stroke-opacity="0.4"/>
      <!-- selection arrow cue -->
      <line x1="46" y1="7" x2="54" y2="7" stroke="#C9A961" stroke-width="1.5"/>
      <text x="62" y="11" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#6B7280">FIRST</text>
      <text x="62" y="28" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="600" fill="#C9A961" letter-spacing="1">FIRST FIT</text>
      <text x="62" y="48" font-size="15" fill="#E8E4D9">首次适应</text>
      <text x="62" y="64" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" fill="#6B7280">找到即分配</text>
    </g>

    <!-- ===== Card 2: BEST FIT (picks smallest sufficient free block) ===== -->
    <g transform="translate(210 0)">
      <!-- mini strip: second block (smallest) selected -->
      <rect x="0" y="0"  width="40" height="18" rx="2" fill="none" stroke="#4A9EFF" stroke-width="1" stroke-dasharray="2 2" stroke-opacity="0.4"/>
      <rect x="0" y="19" width="40" height="10" rx="2" fill="#C9A961" fill-opacity="0.85" stroke="#C9A961" stroke-width="1"/>
      <rect x="0" y="30" width="40" height="16" rx="2" fill="none" stroke="#4A9EFF" stroke-width="1" stroke-dasharray="2 2"/>
      <rect x="0" y="47" width="40" height="13" rx="2" fill="none" stroke="#4A9EFF" stroke-width="1" stroke-dasharray="2 2" stroke-opacity="0.4"/>
      <line x1="46" y1="24" x2="54" y2="24" stroke="#C9A961" stroke-width="1.5"/>
      <text x="62" y="11" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#6B7280">BEST</text>
      <text x="62" y="28" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="600" fill="#C9A961" letter-spacing="1">BEST FIT</text>
      <text x="62" y="48" font-size="15" fill="#E8E4D9">最佳适应</text>
      <text x="62" y="64" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" fill="#6B7280">最小适配</text>
    </g>

    <!-- ===== Card 3: WORST FIT (picks largest free block) ===== -->
    <g transform="translate(420 0)">
      <!-- mini strip: bottom-largest block selected -->
      <rect x="0" y="0"  width="40" height="12" rx="2" fill="none" stroke="#4A9EFF" stroke-width="1" stroke-dasharray="2 2" stroke-opacity="0.4"/>
      <rect x="0" y="13" width="40" height="13" rx="2" fill="none" stroke="#4A9EFF" stroke-width="1" stroke-dasharray="2 2" stroke-opacity="0.4"/>
      <rect x="0" y="27" width="40" height="14" rx="2" fill="none" stroke="#4A9EFF" stroke-width="1" stroke-dasharray="2 2"/>
      <rect x="0" y="42" width="40" height="18" rx="2" fill="#C9A961" fill-opacity="0.85" stroke="#C9A961" stroke-width="1"/>
      <line x1="46" y1="51" x2="54" y2="51" stroke="#C9A961" stroke-width="1.5"/>
      <text x="62" y="11" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#6B7280">WORST</text>
      <text x="62" y="28" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="600" fill="#C9A961" letter-spacing="1">WORST FIT</text>
      <text x="62" y="48" font-size="15" fill="#E8E4D9">最坏适应</text>
      <text x="62" y="64" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" fill="#6B7280">最大块保留</text>
    </g>
  </g>
</svg>
