<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="280" viewBox="0 0 1200 280" role="img" aria-labelledby="dsTitle dsDesc">
  <title id="dsTitle">MemoryBlock 数据结构与有序链表</title>
  <desc id="dsDesc">左侧为 MemoryBlock 结构体的四个字段(start_addr 起始地址、size 分区大小、status 状态、job_id 作业 ID);右侧为按 start_addr 升序组织的有序链表,每个节点对应一个内存分区。</desc>

  <!-- Background -->
  <rect width="1200" height="280" rx="20" fill="#0E1116"/>

  <!-- ============================================================= -->
  <!-- Header                                                        -->
  <!-- ============================================================= -->
  <g id="header" transform="translate(64 44)" font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif'>
    <text x="0" y="0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" letter-spacing="3" fill="#6B7280">DATA STRUCTURE</text>
    <text x="0" y="32" font-size="26" font-weight="700" fill="#E8E4D9" letter-spacing="-0.3">MemoryBlock · 有序链表</text>
  </g>

  <!-- ============================================================= -->
  <!-- LEFT: struct field visualization (x=64..540)                  -->
  <!-- ============================================================= -->
  <g id="struct-block" transform="translate(64 96)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
    <!-- Struct container -->
    <rect x="0" y="0" width="476" height="160" rx="6" fill="#1A1F26" stroke="#6B7280" stroke-width="1" stroke-opacity="0.4"/>

    <!-- Struct name header -->
    <rect x="0" y="0" width="476" height="30" rx="6" fill="#C9A961" fill-opacity="0.12"/>
    <rect x="0" y="24" width="476" height="6" fill="#C9A961" fill-opacity="0.12"/>
    <text x="16" y="20" font-size="13" font-weight="600" fill="#C9A961" letter-spacing="1">typedef struct MemoryBlock</text>

    <!-- Field rows -->
    <g font-size="13" fill="#E8E4D9">
      <!-- Field 1: start_addr -->
      <text x="16" y="54" fill="#4A9EFF">int</text>
      <text x="64" y="54" fill="#E8E4D9" font-weight="600">start_addr</text>
      <text x="200" y="54" fill="#6B7280">// 起始地址 (KB)</text>

      <!-- Field 2: size -->
      <text x="16" y="80" fill="#4A9EFF">int</text>
      <text x="64" y="80" fill="#E8E4D9" font-weight="600">size</text>
      <text x="200" y="80" fill="#6B7280">// 分区大小 (KB)</text>

      <!-- Field 3: status -->
      <text x="16" y="106" fill="#4A9EFF">int</text>
      <text x="64" y="106" fill="#E8E4D9" font-weight="600">status</text>
      <text x="200" y="106" fill="#6B7280">// 0 = 空闲, 1 = 已分配</text>

      <!-- Field 4: job_id -->
      <text x="16" y="132" fill="#4A9EFF">int</text>
      <text x="64" y="132" fill="#E8E4D9" font-weight="600">job_id</text>
      <text x="200" y="132" fill="#6B7280">// 作业 ID, 空闲时为 -1</text>
    </g>

    <!-- closing brace -->
    <text x="16" y="152" font-size="13" fill="#6B7280">} MemoryBlock;</text>
  </g>

  <!-- ============================================================= -->
  <!-- RIGHT: ordered linked list (x=600..1136)                      -->
  <!-- 4 nodes, ascending by start_addr, connected by arrows         -->
  <!-- ============================================================= -->
  <g id="linked-list" transform="translate(600 96)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
    <!-- Caption -->
    <text x="0" y="-8" font-size="11" letter-spacing="2" fill="#6B7280">ORDERED LIST · by start_addr</text>

    <!-- Node 1: 0K, 200K, ALLOC, JOB1 -->
    <g transform="translate(0 0)">
      <rect x="0" y="0" width="120" height="64" rx="4" fill="#1A1F26" stroke="#C9A961" stroke-width="1"/>
      <rect x="0" y="0" width="120" height="16" rx="4" fill="#C9A961" fill-opacity="0.18"/>
      <rect x="0" y="12" width="120" height="4" fill="#C9A961" fill-opacity="0.18"/>
      <text x="8" y="12" font-size="9" fill="#C9A961">NODE 1</text>
      <text x="8" y="32" font-size="11" fill="#E8E4D9">addr 0K</text>
      <text x="8" y="48" font-size="11" fill="#E8E4D9">size 200K</text>
      <text x="8" y="60" font-size="9" fill="#C9A961">ALLOC · JOB1</text>
    </g>

    <!-- Arrow 1 -> 2 -->
    <g stroke="#6B7280" stroke-width="1" fill="none">
      <line x1="120" y1="32" x2="142" y2="32"/>
      <polyline points="138,28 142,32 138,36"/>
    </g>

    <!-- Node 2: 200K, 184K, FREE -->
    <g transform="translate(144 0)">
      <rect x="0" y="0" width="120" height="64" rx="4" fill="#1A1F26" stroke="#4A9EFF" stroke-width="1" stroke-dasharray="3 3"/>
      <rect x="0" y="0" width="120" height="16" rx="4" fill="#4A9EFF" fill-opacity="0.1"/>
      <rect x="0" y="12" width="120" height="4" fill="#4A9EFF" fill-opacity="0.1"/>
      <text x="8" y="12" font-size="9" fill="#4A9EFF">NODE 2</text>
      <text x="8" y="32" font-size="11" fill="#E8E4D9">addr 200K</text>
      <text x="8" y="48" font-size="11" fill="#E8E4D9">size 184K</text>
      <text x="8" y="60" font-size="9" fill="#4A9EFF">FREE · -1</text>
    </g>

    <!-- Arrow 2 -> 3 -->
    <g stroke="#6B7280" stroke-width="1" fill="none">
      <line x1="264" y1="32" x2="286" y2="32"/>
      <polyline points="282,28 286,32 282,36"/>
    </g>

    <!-- Node 3: 384K, 176K, ALLOC, JOB2 -->
    <g transform="translate(288 0)">
      <rect x="0" y="0" width="120" height="64" rx="4" fill="#1A1F26" stroke="#C9A961" stroke-width="1"/>
      <rect x="0" y="0" width="120" height="16" rx="4" fill="#C9A961" fill-opacity="0.18"/>
      <rect x="0" y="12" width="120" height="4" fill="#C9A961" fill-opacity="0.18"/>
      <text x="8" y="12" font-size="9" fill="#C9A961">NODE 3</text>
      <text x="8" y="32" font-size="11" fill="#E8E4D9">addr 384K</text>
      <text x="8" y="48" font-size="11" fill="#E8E4D9">size 176K</text>
      <text x="8" y="60" font-size="9" fill="#C9A961">ALLOC · JOB2</text>
    </g>

    <!-- Arrow 3 -> 4 -->
    <g stroke="#6B7280" stroke-width="1" fill="none">
      <line x1="408" y1="32" x2="430" y2="32"/>
      <polyline points="426,28 430,32 426,36"/>
    </g>

    <!-- Node 4: 560K, 464K, FREE (merged tail) -->
    <g transform="translate(432 0)">
      <rect x="0" y="0" width="120" height="64" rx="4" fill="#1A1F26" stroke="#4A9EFF" stroke-width="1" stroke-dasharray="3 3"/>
      <rect x="0" y="0" width="120" height="16" rx="4" fill="#4A9EFF" fill-opacity="0.1"/>
      <rect x="0" y="12" width="120" height="4" fill="#4A9EFF" fill-opacity="0.1"/>
      <text x="8" y="12" font-size="9" fill="#4A9EFF">NODE 4</text>
      <text x="8" y="32" font-size="11" fill="#E8E4D9">addr 560K</text>
      <text x="8" y="48" font-size="11" fill="#E8E4D9">size 464K</text>
      <text x="8" y="60" font-size="9" fill="#4A9EFF">FREE · -1</text>
    </g>

    <!-- List tail marker -->
    <g transform="translate(560 24)">
      <line x1="0" y1="8" x2="16" y2="8" stroke="#6B7280" stroke-width="1"/>
      <line x1="16" y1="2" x2="16" y2="14" stroke="#6B7280" stroke-width="1"/>
      <text x="22" y="12" font-size="10" fill="#6B7280">NULL</text>
    </g>

    <!-- Note below list -->
    <text x="0" y="96" font-size="11" fill="#6B7280">分配与回收在有序链表上,合并只需检查相邻节点</text>
    <text x="0" y="114" font-size="11" fill="#6B7280" fill-opacity="0.7">节点 4 为回收后双向合并的尾部空闲区</text>
  </g>
</svg>
