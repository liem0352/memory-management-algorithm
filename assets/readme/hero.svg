<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">memory-management-algorithm 可变式分区存储管理系统</title>
  <desc id="heroDesc">C 语言实现首次适应、最佳适应、最坏适应三种内存分配算法的操作系统存储管理项目。右侧为 1024KB 内存分区条带示意,黄铜色块为已分配作业,冷蓝描边块为空闲区,地址轴标注 0x000 至 0x400。</desc>

  <!-- Background: self-supplied to survive GitHub light/dark themes -->
  <rect width="1200" height="360" rx="26" fill="#0E1116"/>

  <!-- ============================================================= -->
  <!-- LEFT: Title block                                              -->
  <!-- ============================================================= -->
  <g id="title-block" transform="translate(56 56)" font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif'>
    <!-- Category eyebrow -->
    <text x="0" y="0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" letter-spacing="3" fill="#6B7280">OS / MEMORY MANAGEMENT</text>

    <!-- Brass accent rule -->
    <rect x="0" y="14" width="40" height="2" fill="#C9A961"/>

    <!-- Main title -->
    <text x="0" y="74" font-size="48" font-weight="700" fill="#E8E4D9" letter-spacing="-0.5">可变式分区存储管理</text>

    <!-- Subtitle -->
    <text x="0" y="110" font-size="20" fill="#6B7280">C 语言 · 首次适应 / 最佳适应 / 最坏适应</text>

    <!-- Metadata row -->
    <text x="0" y="154" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#6B7280">v2.0 UTF-8  ·  1024 KB  ·  gcc -std=c99</text>

    <!-- Thin separator -->
    <line x1="0" y1="186" x2="240" y2="186" stroke="#6B7280" stroke-width="1" stroke-opacity="0.25"/>

    <!-- Legend row: explains the memory map palette on the right -->
    <g transform="translate(0 214)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#6B7280">
      <rect x="0" y="-9" width="12" height="12" rx="2" fill="#C9A961" fill-opacity="0.85" stroke="#C9A961" stroke-width="1"/>
      <text x="20" y="0">ALLOCATED</text>
      <rect x="118" y="-9" width="12" height="12" rx="2" fill="none" stroke="#4A9EFF" stroke-width="1" stroke-dasharray="2 2"/>
      <text x="138" y="0">FREE</text>
      <text x="190" y="0" fill="#6B7280" fill-opacity="0.55">·  ordered by start_addr</text>
    </g>
  </g>

  <!-- ============================================================= -->
  <!-- RIGHT: Memory partition strip (project-native motif)          -->
  <!-- Total region 420 wide. Block column 200 wide, 280 tall.       -->
  <!-- 6 blocks: 3 allocated (brass) + 3 free (blue outline).        -->
  <!-- ============================================================= -->
  <g id="memory-map" transform="translate(720 44)">

    <!-- Caption above the strip -->
    <text x="0" y="-12" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" letter-spacing="2" fill="#6B7280">MEMORY MAP · 1024 KB</text>

    <!-- Block 1: JOB 1, 0-200KB, allocated (brass), y=0..55 -->
    <rect x="0" y="0" width="200" height="55" rx="4" fill="#C9A961" fill-opacity="0.85" stroke="#C9A961" stroke-width="1"/>
    <text x="14" y="24" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="600" fill="#0E1116">JOB 1</text>
    <text x="14" y="42" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#0E1116" fill-opacity="0.78">200 KB  ·  0x000</text>

    <!-- Block 2: FREE, 200-384KB (184KB), y=55..105 -->
    <rect x="0" y="55" width="200" height="50" rx="4" fill="none" stroke="#4A9EFF" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="14" y="79" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#4A9EFF">FREE</text>
    <text x="14" y="95" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#4A9EFF" fill-opacity="0.72">184 KB</text>

    <!-- Block 3: JOB 2, 384-560KB (176KB), allocated, y=105..153 -->
    <rect x="0" y="105" width="200" height="48" rx="4" fill="#C9A961" fill-opacity="0.85" stroke="#C9A961" stroke-width="1"/>
    <text x="14" y="129" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="600" fill="#0E1116">JOB 2</text>
    <text x="14" y="145" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#0E1116" fill-opacity="0.78">176 KB</text>

    <!-- Block 4: FREE, 560-720KB (160KB), y=153..197 -->
    <rect x="0" y="153" width="200" height="44" rx="4" fill="none" stroke="#4A9EFF" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="14" y="175" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#4A9EFF">FREE</text>
    <text x="14" y="190" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#4A9EFF" fill-opacity="0.72">160 KB</text>

    <!-- Block 5: JOB 3, 720-880KB (160KB), allocated, y=197..241 -->
    <rect x="0" y="197" width="200" height="44" rx="4" fill="#C9A961" fill-opacity="0.85" stroke="#C9A961" stroke-width="1"/>
    <text x="14" y="219" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="600" fill="#0E1116">JOB 3</text>
    <text x="14" y="234" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#0E1116" fill-opacity="0.78">160 KB</text>

    <!-- Block 6: FREE, 880-1024KB (144KB), y=241..280 -->
    <rect x="0" y="241" width="200" height="39" rx="4" fill="none" stroke="#4A9EFF" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="14" y="262" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#4A9EFF">FREE</text>
    <text x="14" y="276" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#4A9EFF" fill-opacity="0.72">144 KB</text>

    <!-- Address axis: vertical line at x=230 -->
    <line x1="230" y1="0" x2="230" y2="280" stroke="#6B7280" stroke-width="1"/>

    <!-- Thin connector lines from each block boundary to the axis -->
    <g stroke="#6B7280" stroke-width="1" stroke-opacity="0.45">
      <line x1="200" y1="0" x2="230" y2="0"/>
      <line x1="200" y1="55" x2="230" y2="55"/>
      <line x1="200" y1="105" x2="230" y2="105"/>
      <line x1="200" y1="153" x2="230" y2="153"/>
      <line x1="200" y1="197" x2="230" y2="197"/>
      <line x1="200" y1="241" x2="230" y2="241"/>
      <line x1="200" y1="280" x2="230" y2="280"/>
    </g>

    <!-- Address tick labels (mono). Top and bottom emphasized. -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" fill="#6B7280">
      <text x="238" y="3" font-weight="600" fill="#E8E4D9">0x000</text>
      <text x="238" y="58">200K</text>
      <text x="238" y="108">384K</text>
      <text x="238" y="156">560K</text>
      <text x="238" y="200">720K</text>
      <text x="238" y="244">880K</text>
      <text x="238" y="283" font-weight="600" fill="#E8E4D9">0x400</text>
      <text x="238" y="296" font-size="9" fill="#6B7280" fill-opacity="0.7">(1024 KB)</text>
    </g>
  </g>
</svg>
