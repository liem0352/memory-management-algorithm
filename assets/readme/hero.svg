      <rect x="200" y="0" width="60" height="22" rx="0" fill="#60a5fa" opacity="0.55"/>
      <rect x="260" y="0" width="160" height="22" rx="4" fill="#60a5fa" opacity="0.18"/>
      <text x="40" y="15" text-anchor="middle" font-size="9" fill="#e8edf0" font-family="ui-monospace,monospace">J1 200</text>
      <text x="140" y="15" text-anchor="middle" font-size="9" fill="#11161c" font-family="ui-monospace,monospace" font-weight="600">J2 300</text>
      <text x="230" y="15" text-anchor="middle" font-size="9" fill="#e8edf0" font-family="ui-monospace,monospace">J3 150</text>
