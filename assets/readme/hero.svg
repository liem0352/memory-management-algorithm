    <text x="0" y="52" font-size="40" font-weight="700" fill="#e8edf0">可变式分区存储管理系统</text>
    <text x="0" y="96" font-size="17" fill="#7d8893">C 语言 · 三种经典内存分配算法</text>
    <text x="0" y="122" font-size="17" fill="#7d8893">首次适应 · 最佳适应 · 最坏适应</text>

    <g transform="translate(0,160)" font-size="13.5" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">
      <g><rect width="64" height="30" rx="8" fill="none" stroke="#243040"/><text x="32" y="20" text-anchor="middle" fill="#9aa6b2">C99</text></g>
      <g transform="translate(76,0)"><rect width="76" height="30" rx="8" fill="none" stroke="#243040"/><text x="38" y="20" text-anchor="middle" fill="#9aa6b2">GCC</text></g>
      <g transform="translate(164,0)"><rect width="76" height="30" rx="8" fill="none" stroke="#243040"/><text x="38" y="20" text-anchor="middle" fill="#9aa6b2">WinAPI</text></g>
      <g transform="translate(252,0)"><rect width="84" height="30" rx="8" fill="none" stroke="#1e3a5f"/><text x="42" y="20" text-anchor="middle" fill="#60a5fa">UTF-8</text></g>
      <g transform="translate(348,0)"><rect width="100" height="30" rx="8" fill="none" stroke="#5c3a1e"/><text x="50" y="20" text-anchor="middle" fill="#f97316">分区合并</text></g>
    </g>
    <text x="0" y="236" font-size="13" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" fill="#4d5862">1024KB · 动态分配 · 相邻空闲区自动合并 · 实时状态表</text>
  </g>

  <g transform="translate(712,52)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif">
