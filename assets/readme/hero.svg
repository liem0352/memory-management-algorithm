    </g>

    <g transform="translate(0,114)">
      <rect width="420" height="50" rx="8" fill="#161e2a" stroke="#243040"/>
      <text x="14" y="22" font-size="12.5" fill="#f97316" font-weight="600">Best Fit · 最佳适应</text>
      <text x="14" y="38" font-size="10.5" fill="#7d8893" font-family="ui-monospace,monospace">查找满足要求的最小空闲区,减少浪费</text>
      <g transform="translate(280,12)">
        <rect width="126" height="26" rx="5" fill="#2a1c10" stroke="#5c3a1e"/>
        <text x="14" y="17" font-size="10" fill="#f97316" font-family="ui-monospace,monospace">利用率高</text>
        <text x="112" y="17" font-size="10" fill="#7d8893" font-family="ui-monospace,monospace" text-anchor="end">小碎片多</text>
      </g>
    </g>

    <g transform="translate(0,174)">
      <rect width="420" height="50" rx="8" fill="#161e2a" stroke="#243040"/>
      <text x="14" y="22" font-size="12.5" fill="#a3e635" font-weight="600">Worst Fit · 最坏适应</text>
      <text x="14" y="38" font-size="10.5" fill="#7d8893" font-family="ui-monospace,monospace">查找最大空闲区分配,保留较大剩余</text>
      <g transform="translate(280,12)">
        <rect width="126" height="26" rx="5" fill="#1a2410" stroke="#3a4a1e"/>
