<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">memory-management-algorithm 可变式分区存储管理系统</title>
  <desc id="heroDesc">C 语言实现首次适应、最佳适应、最坏适应三种内存分配算法的操作系统存储管理项目。右侧为 1024KB 内存分区条带示意,黄铜色块为已分配作业,冷蓝描边块为空闲区,地址轴标注 0x000 至 0x400。</desc>

  <!-- Background: self-supplied to survive GitHub light/dark themes -->
  <rect width="1200" height="360" rx="20" fill="#0E1116"/>

  <!-- ============================================================= -->
  <!-- LEFT: Title block                                              -->
  <!-- ============================================================= -->
  <g id="title-block" transform="translate(64 64)" font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif'>
    <!-- Category eyebrow (mono, low-contrast) -->
    <text x="0" y="0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" letter-spacing="3" fill="#6B7280">OS / MEMORY MANAGEMENT</text>

    <!-- Brass accent rule -->
    <rect x="0" y="14" width="44" height="2" fill="#C9A961"/>

    <!-- Main title -->
    <text x="0" y="78" font-size="50" font-weight="700" fill="#E8E4D9" letter-spacing="-0.5">可变式分区存储管理</text>

    <!-- Subtitle -->
    <text x="0" y="116" font-size="20" fill="#9CA3AF">C 语言实现 · 首次适应 / 最佳适应 / 最坏适应</text>

    <!-- Metadata row (mono) -->
    <text x="0" y="160" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#6B7280">v2.0 UTF-8  ·  1024 KB  ·  gcc -std=c99</text>

    <!-- Thin separator -->
    <line x1="0" y1="194" x2="260" y2="194" stroke="#6B7280" stroke-width="1" stroke-opacity="0.3"/>

    <!-- Legend row: explains the memory map palette on the right -->
    <g transform="translate(0 224)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#6B7280">
      <rect x="0" y="-9" width="12" height="12" rx="2" fill="#C9A961" fill-opacity="0.85" stroke="#C9A961" stroke-width="1"/>
      <text x="20" y="0">ALLOCATED</text>
      <rect x="124" y="-9" width="12" height="12" rx="2" fill="none" stroke="#4A9EFF" stroke-width="1" stroke-dasharray="2 2"/>
      <text x="144" y="0">FREE</text>
      <text x="196" y="0" fill="#6B7280" fill-opacity="0.6">ordered by start_addr</text>
    </g>
  </g>

  <!-- ============================================================= -->
  <!-- RIGHT: Memory partition strip (project-native motif)          -->
  <!-- 6 blocks: 3 allocated (brass) + 3 free (blue outline).        -->
  <!-- ============================================================= -->
  <g id="memory-map" transform="translate(760 48)">

    <!-- Caption above the strip -->
    <text x="0" y="-14" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" letter-spacing="2" fill="#6B7280">MEMORY MAP · 1024 KB</text>

    <!-- Block 1: JOB 1, 0-200KB, allocated (brass) -->
    <rect x="0" y="0" width="200" height="56" rx="4" fill="#C9A961" fill-opacity="0.85" stroke="#C9A961" stroke-width="1"/>
    <text x="14" y="24" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="600" fill="#0E1116">JOB 1</text>
    <text x="14" y="42" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#0E1116" fill-opacity="0.78">200 KB  ·  0x000</text>

    <!-- Block 2: FREE, 200-384KB (184KB) -->
    <rect x="0" y="56" width="200" height="50" rx="4" fill="none" stroke="#4A9EFF" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="14" y="80" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#4A9EFF">FREE</text>
    <text x="14" y="96" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#4A9EFF" fill-opacity="0.72">184 KB</text>

    <!-- Block 3: JOB 2, 384-560KB (176KB), allocated -->
    <rect x="0" y="106" width="200" height="48" rx="4" fill="#C9A961" fill-opacity="0.85" stroke="#C9A961" stroke-width="1"/>
    <text x="14" y="130" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="600" fill="#0E1116">JOB 2</text>
    <text x="14" y="146" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#0E1116" fill-opacity="0.78">176 KB</text>

    <!-- Block 4: FREE, 560-720KB (160KB) -->
    <rect x="0" y="154" width="200" height="44" rx="4" fill="none" stroke="#4A9EFF" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="14" y="176" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#4A9EFF">FREE</text>
    <text x="14" y="190" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#4A9EFF" fill-opacity="0.72">160 KB</text>

    <!-- Block 5: JOB 3, 720-880KB (160KB), allocated -->
    <rect x="0" y="198" width="200" height="44" rx="4" fill="#C9A961" fill-opacity="0.85" stroke="#C9A961" stroke-width="1"/>
    <text x="14" y="220" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="600" fill="#0E1116">JOB 3</text>
    <text x="14" y="234" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#0E1116" fill-opacity="0.78">160 KB</text>

    <!-- Block 6: FREE, 880-1024KB (144KB) -->
    <rect x="0" y="242" width="200" height="38" rx="4" fill="none" stroke="#4A9EFF" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="14" y="262" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#4A9EFF">FREE</text>
    <text x="14" y="276" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#4A9EFF" fill-opacity="0.72">144 KB</text>

    <!-- Address axis: vertical line at x=230 -->
    <line x1="230" y1="0" x2="230" y2="280" stroke="#6B7280" stroke-width="1"/>

    <!-- Thin connector lines from each block boundary to the axis -->
    <g stroke="#6B7280" stroke-width="1" stroke-opacity="0.45">
      <line x1="200" y1="0" x2="230" y2="0"/>
      <line x1="200" y1="56" x2="230" y2="56"/>
      <line x1="200" y1="106" x2="230" y2="106"/>
      <line x1="200" y1="154" x2="230" y2="154"/>
      <line x1="200" y1="198" x2="230" y2="198"/>
      <line x1="200" y1="242" x2="230" y2="242"/>
      <line x1="200" y1="280" x2="230" y2="280"/>
    </g>

    <!-- Address tick labels (mono) -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" fill="#6B7280">
      <text x="238" y="3" font-weight="600" fill="#E8E4D9">0x000</text>
      <text x="238" y="59">200K</text>
      <text x="238" y="109">384K</text>
      <text x="238" y="157">560K</text>
      <text x="238" y="201">720K</text>
      <text x="238" y="245">880K</text>
      <text x="238" y="283" font-weight="600" fill="#E8E4D9">0x400</text>
      <text x="238" y="296" font-size="9" fill="#6B7280" fill-opacity="0.7">(1024 KB)</text>
    </g>
  </g>
</svg>
