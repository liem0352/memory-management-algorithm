<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="340" viewBox="0 0 1200 340" role="img" aria-labelledby="t d">
  <title id="t">memory-management-algorithm · 可变式分区存储管理系统</title>
  <desc id="d">C 语言实现可变式分区存储管理,含首次适应、最佳适应、最坏适应三种算法。左侧标题与技术栈,右侧展示 1024KB 内存分区与三种算法分配策略对比。</desc>
  <rect width="1200" height="340" rx="22" fill="#11161c"/>
  <rect x="0" y="0" width="6" height="340" rx="3" fill="#60a5fa"/>

  <g transform="translate(56,54)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif">
